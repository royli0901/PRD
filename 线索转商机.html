</head>
<body>
    <div class="container">
        <h1>线索转商机</h1>
        <p class="page-desc">评分模型 · 分级规则 · 转化门槛</p>
        <nav class="tabs" aria-label="CRM 页面导航">
            <a class="tab" href="index.html">CRM 核心概念</a>
            <a class="tab" href="客户健康度方案.html">客户健康度方案</a>
            <a class="tab" href="客户健康度演示.html">客户健康度演示</a>
            <a class="tab" href="客户生命周期.html">客户生命周期</a>
            <a class="tab" href="商机阶段.html">商机阶段</a>
            <a class="tab active" href="线索转商机.html">线索转商机</a>
        </nav>

        <section class="section">
            <div class="section-head"><span class="section-label">🧮 评分体系</span><hr class="section-divider"></div>
            <div class="card"><h3>模塑一体（3 维）</h3><p>目标客户、需求明确度、成交条件，按固定权重合成 100 分。</p></div>
            <div class="card"><h3>商品模（5 维）</h3><p>在基础资质与工程链路之外，新增赛道匹配和商务条件两个维度。</p></div>
        </section>

        <section class="section">
            <div class="section-head"><span class="section-label">🚧 硬性门槛</span><hr class="section-divider"></div>
            <div class="card"><h3>需求明确度拦截</h3><p>商品模场景中，图纸/样品不足导致维度分低于门槛时，不允许转商机。</p></div>
        </section>

        <section class="section">
            <div class="section-head"><span class="section-label">🏷️ 分级建议</span><hr class="section-divider"></div>
            <div class="card"><h3>A/B/C/D 四级</h3><p>A 快通道，B 标准转化，C 观察培育，D 放弃归档；可用于销售优先级和资源分配。</p></div>
        </section>
    </div>
</body>

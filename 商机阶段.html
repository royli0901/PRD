        <nav class="tabs" aria-label="CRM 页面导航">

        <section class="section">
            <div class="section-head"><span class="section-label">🚀 推进阶段</span><hr class="section-divider"></div>
            <div class="card"><h3>初步识别</h3><p>确认 RFQ 机会、建立关系图谱、补齐基础需求。</p></div>
            <div class="card"><h3>报价博弈</h3><p>完成首轮与更新报价，持续记录竞争态势和客户反馈。</p></div>
            <div class="card"><h3>深度谈判</h3><p>锁定付款与商务条款，必要时触发审批流程。</p></div>
            <div class="card"><h3>赢单转化</h3><p>客户确认后进入立项、系统同步与项目移交。</p></div>
        </section>

        <section class="section">
            <div class="section-head"><span class="section-label">📍 异常路径</span><hr class="section-divider"></div>
            <div class="card"><h3>Suspend 搁置</h3><p>任意阶段可进入搁置，系统生成复活任务并设置超时关闭。</p></div>
            <div class="card"><h3>丢单关闭</h3><p>必须填写标准化丢单原因，沉淀到知识库复盘。</p></div>
        </section>

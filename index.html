            line-height: 1.6;
            transition: all .15s;
            box-shadow: var(--shadow-sm);
            word-break: break-all;
        }

        .quick-link:hover {
            border-color: var(--accent-b);
            background: var(--accent-d);
            color: var(--accent-hv);
